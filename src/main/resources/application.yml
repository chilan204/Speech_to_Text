spring:
  application:
    name: Speech_to_Text

  datasource:
    url: jdbc:mysql://localhost:3306/speech_to_text?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    com.example.speech_to_text: DEBUG
    org.hibernate.SQL: DEBUG

server:
  port: 8080

app:
  whisper:
    url: http://127.0.0.1:5001
    timeout-seconds: 120
